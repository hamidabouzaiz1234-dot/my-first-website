<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>bien envoyer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f7fa, #f2f7f7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .success-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: #4CAF50;
            color: white;
            font-size: 36px;
            line-height: 60px;
        }

        h1 {
            margin: 10px 0;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
        }

        .btn:hover {
            background: #2b8efc;
        }
    </style>
</head>

<body>

    <div class="success-box">
        <div class="icon">✓</div>
        <h1>Bien Envoyer</h1>
        <p>Merci pour votre message ! Nous sommes désolés et nous allons régler le problème très bientôt</p>

        <a href="index1.html" class="btn">Retour à l'Accueil</a>
    </div>

</body>

</html>
