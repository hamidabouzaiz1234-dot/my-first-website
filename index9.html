<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alert</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="alert alert-warning mt-4" role="alert">
        <h5 class="alert-heading">
            <i class="bi bi-info-circle-fill"></i> Information
        </h5>

        <p>
            Nous sommes désolés, mais ce livre audio n’est pas disponible pour le moment.
            Vous pouvez nous indiquer son titre ci-dessous afin que nous puissions le proposer dans les plus brefs
            délais.
        </p>

        <hr>

        <form>
            <div class="mb-3">
                <label for="bookName" class="form-label">
                    Nom du livre audio
                </label>
                <input type="text" class="form-control" id="bookName" placeholder="Entrez le nom du livre">
            </div>

            <button type="submit" class="btn btn-dark"><a href="envoyerbook.html">Envoyer</a></button>
        </form>
    </div>

</body>

</html>
