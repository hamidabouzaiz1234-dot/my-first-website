<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de connexion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            color: #333;
        }

        .input-box {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-top: 5px;
            padding: 5px 10px;
        }

        .input-box .icon {
            font-size: 18px;
            margin-right: 8px;
        }

        .input-box input {
            border: none;
            outline: none;
            flex: 1;
            padding: 8px;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .options a {
            text-decoration: none;
            color: #007bff;
        }

        .options a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .signup-text {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .signup-text a {
            color: #007bff;
            text-decoration: none;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .container {
                width: 90%;
                padding: 20px;

            }
        }
    </style>
</head>

<body>
    <div class="container">
        <form class="login-form">
            <h2>Sign in</h2>

            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-box">
                    <span class="icon">📧</span>
                    <input type="email" id="email" placeholder="Your email" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-box">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" placeholder="Your password " required>
                </div>
            </div>

            <div class="options">
                <label><input type="checkbox"> Save password</label>
                <a href="#">Forgot?</a>
            </div>

            <button type="submit" class="btn"><a href="signup.html">Login</a></button>

            <p class="signup-text">Don't have an account? <a href="crezcount.html">Sign up</a></p>
        </form>
    </div>
</body>

</html>
