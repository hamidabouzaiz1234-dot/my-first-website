<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Créer un compte</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 350px;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Créer un compte</h2>

        <label>Nom complet</label>
        <input type="text" placeholder="Votre nom">

        <label>Email</label>
        <input type="email" placeholder="Votre email">

        <label>Mot de passe</label>
        <input type="password" placeholder="Mot de passe">

        <label>Nom de la banque</label>
        <input type="text" placeholder="Ex: Attijari, CIH">

        <label>Numéro de compte</label>
        <input type="text" placeholder="XXXX XXXX XXXX">

        <label>IBAN</label>
        <input type="text" placeholder="IBAN">

        <button><a href="comptebiencrez.html">Créer le compte</a></button>
    </div>

</body>

</html>
