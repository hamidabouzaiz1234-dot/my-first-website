.card11 {

.card22 {
 animation: slide2 9s infinite;

animation: slide3 9s infinite;

        @keyframes slide1 {

            0%,
            33% {
                transform: translate(-50%, -50%) scale(1.1);
                z-index: 3;
                opacity: 1;
            }

            34%,
            66% {
                transform: translate(-150%, -50%) scale(0.8);
                z-index: 1;
                opacity: 0.5;
            }

            67%,
            100% {
                transform: translate(50%, -50%) scale(0.8);
                z-index: 1;
                opacity: 0.5;
            }
        }

        @keyframes slide2 {

            0%,
            33% {
                transform: translate(50%, -50%) scale(0.8);
                opacity: 0.5;
            }

            34%,
            66% {
                transform: translate(-50%, -50%) scale(1.1);

                z-index: 3;

            67%,
            100% {

        @keyframes slide3 {
